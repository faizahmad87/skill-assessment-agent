services:
  - type: web
    name: skill-assessment-api
    runtime: python
    rootDir: backend
    buildCommand: pip install poetry && poetry config virtualenvs.create false && poetry install --no-dev
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: https://skill-assessment-agent-nine.vercel.app
      - key: DATABASE_URL
        sync: false
